<svg width="200" height="280" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
    <pattern id="papel-picado" patternUnits="userSpaceOnUse" width="40" height="40">
      <rect width="40" height="40" fill="#dc2626"/>
      <polygon points="10,5 15,15 5,15" fill="#fbbf24"/>
      <polygon points="30,25 35,35 25,35" fill="#10b981"/>
      <circle cx="20" cy="20" r="3" fill="#ec4899"/>
    </pattern>
  </defs>
  
  <!-- Card background -->
  <rect x="5" y="5" width="190" height="270" rx="15" ry="15" fill="url(#cardGradient)" stroke="#fbbf24" stroke-width="3"/>
  
  <!-- Inner border -->
  <rect x="15" y="15" width="170" height="250" rx="10" ry="10" fill="none" stroke="#fbbf24" stroke-width="2"/>
  
  <!-- Central skull (Día de Muertos style) -->
  <circle cx="100" cy="140" r="40" fill="#f3f4f6" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Eye sockets -->
  <circle cx="85" cy="130" r="8" fill="#1f2937"/>
  <circle cx="115" cy="130" r="8" fill="#1f2937"/>
  
  <!-- Decorative eye flowers -->
  <circle cx="85" cy="130" r="5" fill="#fbbf24"/>
  <circle cx="115" cy="130" r="5" fill="#fbbf24"/>
  <circle cx="85" cy="130" r="2" fill="#dc2626"/>
  <circle cx="115" cy="130" r="2" fill="#dc2626"/>
  
  <!-- Nasal cavity -->
  <polygon points="95,140 100,150 105,140" fill="#1f2937"/>
  
  <!-- Decorative mouth -->
  <path d="M80 155 Q100 165 120 155" stroke="#1f2937" stroke-width="3" fill="none"/>
  
  <!-- Forehead decoration -->
  <circle cx="100" cy="110" r="6" fill="#fbbf24"/>
  <circle cx="90" cy="115" r="3" fill="#ec4899"/>
  <circle cx="110" cy="115" r="3" fill="#10b981"/>
  
  <!-- Corner marigolds (cempasúchil) -->
  <g transform="translate(30,40)">
    <circle cx="0" cy="0" r="8" fill="#f59e0b"/>
    <circle cx="-3" cy="-3" r="4" fill="#fbbf24"/>
    <circle cx="3" cy="3" r="4" fill="#fbbf24"/>
    <circle cx="-3" cy="3" r="3" fill="#f97316"/>
    <circle cx="3" cy="-3" r="3" fill="#f97316"/>
  </g>
  
  <g transform="translate(170,40)">
    <circle cx="0" cy="0" r="8" fill="#f59e0b"/>
    <circle cx="-3" cy="-3" r="4" fill="#fbbf24"/>
    <circle cx="3" cy="3" r="4" fill="#fbbf24"/>
    <circle cx="-3" cy="3" r="3" fill="#f97316"/>
    <circle cx="3" cy="-3" r="3" fill="#f97316"/>
  </g>
  
  <g transform="translate(30,240)">
    <circle cx="0" cy="0" r="8" fill="#f59e0b"/>
    <circle cx="-3" cy="-3" r="4" fill="#fbbf24"/>
    <circle cx="3" cy="3" r="4" fill="#fbbf24"/>
    <circle cx="-3" cy="3" r="3" fill="#f97316"/>
    <circle cx="3" cy="-3" r="3" fill="#f97316"/>
  </g>
  
  <g transform="translate(170,240)">
    <circle cx="0" cy="0" r="8" fill="#f59e0b"/>
    <circle cx="-3" cy="-3" r="4" fill="#fbbf24"/>
    <circle cx="3" cy="3" r="4" fill="#fbbf24"/>
    <circle cx="-3" cy="3" r="3" fill="#f97316"/>
    <circle cx="3" cy="-3" r="3" fill="#f97316"/>
  </g>
  
  <!-- Decorative border elements -->
  <circle cx="100" cy="30" r="4" fill="#fbbf24"/>
  <circle cx="100" cy="250" r="4" fill="#fbbf24"/>
  <circle cx="30" cy="140" r="4" fill="#fbbf24"/>
  <circle cx="170" cy="140" r="4" fill="#fbbf24"/>
  
  <!-- Small decorative crosses -->
  <g transform="translate(60,80)">
    <rect x="-1" y="-6" width="2" height="12" fill="#fbbf24"/>
    <rect x="-6" y="-1" width="12" height="2" fill="#fbbf24"/>
  </g>
  
  <g transform="translate(140,80)">
    <rect x="-1" y="-6" width="2" height="12" fill="#fbbf24"/>
    <rect x="-6" y="-1" width="12" height="2" fill="#fbbf24"/>
  </g>
  
  <g transform="translate(60,200)">
    <rect x="-1" y="-6" width="2" height="12" fill="#fbbf24"/>
    <rect x="-6" y="-1" width="12" height="2" fill="#fbbf24"/>
  </g>
  
  <g transform="translate(140,200)">
    <rect x="-1" y="-6" width="2" height="12" fill="#fbbf24"/>
    <rect x="-6" y="-1" width="12" height="2" fill="#fbbf24"/>
  </g>
  
  <!-- Title at bottom -->
  <text x="100" y="270" text-anchor="middle" font-family="serif" font-size="10" fill="#fbbf24" font-weight="bold">MEMORAMA TERROR</text>
</svg>