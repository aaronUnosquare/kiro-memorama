<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nahualGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#451a03;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#nahualGradient)" stroke="#fbbf24" stroke-width="3"/>
  
  <!-- Jaguar spots pattern -->
  <circle cx="60" cy="60" r="6" fill="#1c1917" opacity="0.6"/>
  <circle cx="140" cy="70" r="5" fill="#1c1917" opacity="0.6"/>
  <circle cx="70" cy="140" r="7" fill="#1c1917" opacity="0.6"/>
  <circle cx="130" cy="130" r="5" fill="#1c1917" opacity="0.6"/>
  
  <!-- Human-jaguar hybrid face -->
  <ellipse cx="100" cy="90" rx="35" ry="40" fill="#a16207" stroke="#374151" stroke-width="2"/>
  
  <!-- Jaguar ears -->
  <ellipse cx="75" cy="60" rx="8" ry="15" fill="#a16207" stroke="#374151" stroke-width="1"/>
  <ellipse cx="125" cy="60" rx="8" ry="15" fill="#a16207" stroke="#374151" stroke-width="1"/>
  <ellipse cx="75" cy="62" rx="4" ry="8" fill="#1c1917"/>
  <ellipse cx="125" cy="62" rx="4" ry="8" fill="#1c1917"/>
  
  <!-- Eyes (cat-like) -->
  <ellipse cx="85" cy="80" rx="10" ry="8" fill="#fbbf24"/>
  <ellipse cx="115" cy="80" rx="10" ry="8" fill="#fbbf24"/>
  <ellipse cx="85" cy="80" rx="3" ry="6" fill="#1c1917"/>
  <ellipse cx="115" cy="80" rx="3" ry="6" fill="#1c1917"/>
  
  <!-- Nose (cat-like) -->
  <polygon points="95,90 100,95 105,90 100,88" fill="#1c1917"/>
  
  <!-- Mouth -->
  <path d="M90 100 Q100 108 110 100" stroke="#1c1917" stroke-width="2" fill="none"/>
  
  <!-- Whiskers -->
  <line x1="60" y1="95" x2="80" y2="92" stroke="#1c1917" stroke-width="1"/>
  <line x1="120" y1="92" x2="140" y2="95" stroke="#1c1917" stroke-width="1"/>
  <line x1="60" y1="105" x2="80" y2="102" stroke="#1c1917" stroke-width="1"/>
  <line x1="120" y1="102" x2="140" y2="105" stroke="#1c1917" stroke-width="1"/>
  
  <!-- Transformation aura -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5" stroke-dasharray="5,5"/>
  
  <!-- Body/torso -->
  <ellipse cx="100" cy="140" rx="25" ry="35" fill="#a16207" stroke="#374151" stroke-width="2"/>
  
  <!-- Mexican decorative elements -->
  <circle cx="45" cy="45" r="4" fill="#fbbf24"/>
  <circle cx="155" cy="45" r="4" fill="#fbbf24"/>
  <circle cx="45" cy="155" r="4" fill="#fbbf24"/>
  <circle cx="155" cy="155" r="4" fill="#fbbf24"/>
  
  <!-- Title -->
  <text x="100" y="190" text-anchor="middle" font-family="serif" font-size="12" fill="#fbbf24" font-weight="bold">NAHUAL</text>
</svg>