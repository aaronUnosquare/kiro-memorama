<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chupacabrasGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#052e16;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#chupacabrasGradient)" stroke="#fbbf24" stroke-width="3"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="120" rx="40" ry="50" fill="#374151" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Head -->
  <ellipse cx="100" cy="80" rx="30" ry="35" fill="#374151" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Spines on back -->
  <polygon points="80,90 85,70 90,90" fill="#7c2d12"/>
  <polygon points="95,85 100,65 105,85" fill="#7c2d12"/>
  <polygon points="110,90 115,70 120,90" fill="#7c2d12"/>
  
  <!-- Eyes (red and glowing) -->
  <circle cx="90" cy="75" r="8" fill="#dc2626"/>
  <circle cx="110" cy="75" r="8" fill="#dc2626"/>
  <circle cx="90" cy="75" r="4" fill="#fef2f2"/>
  <circle cx="110" cy="75" r="4" fill="#fef2f2"/>
  
  <!-- Nostrils -->
  <ellipse cx="95" cy="85" rx="2" ry="3" fill="#1f2937"/>
  <ellipse cx="105" cy="85" rx="2" ry="3" fill="#1f2937"/>
  
  <!-- Mouth with fangs -->
  <path d="M85 95 Q100 105 115 95" stroke="#1f2937" stroke-width="2" fill="none"/>
  <polygon points="92,95 95,105 98,95" fill="#f3f4f6"/>
  <polygon points="102,95 105,105 108,95" fill="#f3f4f6"/>
  
  <!-- Claws -->
  <polygon points="70,140 75,155 80,140" fill="#1f2937"/>
  <polygon points="120,140 125,155 130,140" fill="#1f2937"/>
  
  <!-- Mexican decorative elements -->
  <circle cx="40" cy="40" r="4" fill="#fbbf24"/>
  <circle cx="160" cy="40" r="4" fill="#fbbf24"/>
  <circle cx="40" cy="160" r="4" fill="#fbbf24"/>
  <circle cx="160" cy="160" r="4" fill="#fbbf24"/>
  
  <!-- Title -->
  <text x="100" y="190" text-anchor="middle" font-family="serif" font-size="12" fill="#fbbf24" font-weight="bold">CHUPACABRAS</text>
</svg>