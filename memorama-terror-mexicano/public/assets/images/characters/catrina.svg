<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="catrinaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#431407;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#catrinaGradient)" stroke="#fbbf24" stroke-width="3"/>
  
  <!-- Elegant hat -->
  <ellipse cx="100" cy="45" rx="45" ry="15" fill="#1f2937" stroke="#fbbf24" stroke-width="2"/>
  <rect x="85" y="30" width="30" height="25" fill="#1f2937" stroke="#fbbf24" stroke-width="2"/>
  
  <!-- Hat decoration (flowers) -->
  <circle cx="75" cy="40" r="6" fill="#dc2626"/>
  <circle cx="125" cy="40" r="6" fill="#f59e0b"/>
  <circle cx="100" cy="35" r="5" fill="#ec4899"/>
  
  <!-- Skull face -->
  <circle cx="100" cy="90" r="35" fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
  
  <!-- Eye sockets -->
  <circle cx="85" cy="80" r="8" fill="#1f2937"/>
  <circle cx="115" cy="80" r="8" fill="#1f2937"/>
  
  <!-- Decorative eye flowers -->
  <circle cx="85" cy="80" r="4" fill="#dc2626"/>
  <circle cx="115" cy="80" r="4" fill="#dc2626"/>
  <circle cx="85" cy="80" r="2" fill="#fbbf24"/>
  <circle cx="115" cy="80" r="2" fill="#fbbf24"/>
  
  <!-- Nasal cavity -->
  <polygon points="95,90 100,100 105,90" fill="#1f2937"/>
  
  <!-- Mouth (stitched smile) -->
  <path d="M80 105 Q100 115 120 105" stroke="#1f2937" stroke-width="3" fill="none"/>
  <line x1="85" y1="107" x2="85" y2="113" stroke="#1f2937" stroke-width="2"/>
  <line x1="95" y1="110" x2="95" y2="116" stroke="#1f2937" stroke-width="2"/>
  <line x1="105" y1="110" x2="105" y2="116" stroke="#1f2937" stroke-width="2"/>
  <line x1="115" y1="107" x2="115" y2="113" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Elegant dress -->
  <path d="M70 125 Q100 120 130 125 L135 170 Q100 175 65 170 Z" fill="#1f2937" stroke="#fbbf24" stroke-width="2"/>
  
  <!-- Dress decorations -->
  <circle cx="85" cy="140" r="3" fill="#fbbf24"/>
  <circle cx="100" cy="145" r="3" fill="#dc2626"/>
  <circle cx="115" cy="140" r="3" fill="#fbbf24"/>
  
  <!-- Jewelry -->
  <ellipse cx="100" cy="120" rx="15" ry="3" fill="#fbbf24" stroke="#374151" stroke-width="1"/>
  
  <!-- Mexican decorative elements (papel picado style) -->
  <polygon points="40,40 50,35 50,45" fill="#ec4899"/>
  <polygon points="150,40 160,35 160,45" fill="#10b981"/>
  <polygon points="40,160 50,155 50,165" fill="#3b82f6"/>
  <polygon points="150,160 160,155 160,165" fill="#f59e0b"/>
  
  <!-- Title -->
  <text x="100" y="190" text-anchor="middle" font-family="serif" font-size="12" fill="#fbbf24" font-weight="bold">LA CATRINA</text>
</svg>