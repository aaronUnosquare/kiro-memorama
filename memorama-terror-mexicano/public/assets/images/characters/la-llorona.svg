<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lloronaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#lloronaGradient)" stroke="#fbbf24" stroke-width="3"/>
  
  <!-- Water drops (tears) -->
  <ellipse cx="70" cy="80" rx="3" ry="8" fill="#60a5fa" opacity="0.8"/>
  <ellipse cx="130" cy="85" rx="3" ry="8" fill="#60a5fa" opacity="0.8"/>
  <ellipse cx="65" cy="95" rx="2" ry="6" fill="#60a5fa" opacity="0.6"/>
  <ellipse cx="135" cy="100" rx="2" ry="6" fill="#60a5fa" opacity="0.6"/>
  
  <!-- Face outline -->
  <ellipse cx="100" cy="90" rx="35" ry="45" fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
  
  <!-- Hair -->
  <path d="M65 60 Q100 45 135 60 Q140 70 135 80 Q130 85 125 80 Q120 75 115 80 Q110 85 105 80 Q100 75 95 80 Q90 85 85 80 Q80 75 75 80 Q70 85 65 80 Q60 70 65 60" fill="#1f2937"/>
  
  <!-- Eyes (sad/crying) -->
  <ellipse cx="85" cy="80" rx="8" ry="12" fill="#1f2937"/>
  <ellipse cx="115" cy="80" rx="8" ry="12" fill="#1f2937"/>
  <circle cx="85" cy="78" r="3" fill="#dc2626"/>
  <circle cx="115" cy="78" r="3" fill="#dc2626"/>
  
  <!-- Mouth (crying) -->
  <path d="M90 105 Q100 115 110 105" stroke="#374151" stroke-width="3" fill="none"/>
  
  <!-- Dress/robe -->
  <path d="M70 130 Q100 125 130 130 L135 180 Q100 185 65 180 Z" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  
  <!-- Mexican decorative elements -->
  <circle cx="50" cy="50" r="4" fill="#fbbf24"/>
  <circle cx="150" cy="50" r="4" fill="#fbbf24"/>
  <circle cx="50" cy="150" r="4" fill="#fbbf24"/>
  <circle cx="150" cy="150" r="4" fill="#fbbf24"/>
  
  <!-- Title -->
  <text x="100" y="190" text-anchor="middle" font-family="serif" font-size="12" fill="#fbbf24" font-weight="bold">LA LLORONA</text>
</svg>