<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tzitzimimehGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#581c87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#tzitzimimehGradient)" stroke="#fbbf24" stroke-width="3"/>
  
  <!-- Stars (cosmic elements) -->
  <polygon points="50,30 52,36 58,36 53,40 55,46 50,42 45,46 47,40 42,36 48,36" fill="#fbbf24"/>
  <polygon points="150,40 152,46 158,46 153,50 155,56 150,52 145,56 147,50 142,46 148,46" fill="#fbbf24"/>
  <polygon points="160,120 162,126 168,126 163,130 165,136 160,132 155,136 157,130 152,126 158,126" fill="#fbbf24"/>
  
  <!-- Skeletal goddess body -->
  <ellipse cx="100" cy="120" rx="30" ry="40" fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
  
  <!-- Skull head -->
  <circle cx="100" cy="75" r="25" fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
  
  <!-- Eye sockets -->
  <circle cx="90" cy="70" r="6" fill="#1f2937"/>
  <circle cx="110" cy="70" r="6" fill="#1f2937"/>
  
  <!-- Glowing eyes -->
  <circle cx="90" cy="70" r="3" fill="#7c2d12"/>
  <circle cx="110" cy="70" r="3" fill="#7c2d12"/>
  
  <!-- Nasal cavity -->
  <polygon points="95,78 100,85 105,78" fill="#1f2937"/>
  
  <!-- Jaw -->
  <rect x="85" y="85" width="30" height="8" fill="#f3f4f6" stroke="#374151" stroke-width="1"/>
  <rect x="88" y="87" width="3" height="4" fill="#f3f4f6"/>
  <rect x="94" y="87" width="3" height="4" fill="#f3f4f6"/>
  <rect x="103" y="87" width="3" height="4" fill="#f3f4f6"/>
  <rect x="109" y="87" width="3" height="4" fill="#f3f4f6"/>
  
  <!-- Skeletal arms -->
  <ellipse cx="70" cy="110" rx="8" ry="25" fill="#f3f4f6" stroke="#374151" stroke-width="1"/>
  <ellipse cx="130" cy="110" rx="8" ry="25" fill="#f3f4f6" stroke="#374151" stroke-width="1"/>
  
  <!-- Bone joints -->
  <circle cx="70" cy="100" r="4" fill="#e5e7eb" stroke="#374151" stroke-width="1"/>
  <circle cx="130" cy="100" r="4" fill="#e5e7eb" stroke="#374151" stroke-width="1"/>
  <circle cx="70" cy="120" r="4" fill="#e5e7eb" stroke="#374151" stroke-width="1"/>
  <circle cx="130" cy="120" r="4" fill="#e5e7eb" stroke="#374151" stroke-width="1"/>
  
  <!-- Skeletal hands -->
  <ellipse cx="65" cy="135" rx="6" ry="10" fill="#f3f4f6" stroke="#374151" stroke-width="1"/>
  <ellipse cx="135" cy="135" rx="6" ry="10" fill="#f3f4f6" stroke="#374151" stroke-width="1"/>
  
  <!-- Finger bones -->
  <rect x="62" y="140" width="1" height="8" fill="#374151"/>
  <rect x="65" y="142" width="1" height="8" fill="#374151"/>
  <rect x="68" y="140" width="1" height="8" fill="#374151"/>
  <rect x="132" y="140" width="1" height="8" fill="#374151"/>
  <rect x="135" y="142" width="1" height="8" fill="#374151"/>
  <rect x="138" y="140" width="1" height="8" fill="#374151"/>
  
  <!-- Rib cage -->
  <ellipse cx="95" cy="125" rx="2" ry="15" fill="none" stroke="#374151" stroke-width="1"/>
  <ellipse cx="105" cy="125" rx="2" ry="15" fill="none" stroke="#374151" stroke-width="1"/>
  <ellipse cx="100" cy="125" rx="2" ry="18" fill="none" stroke="#374151" stroke-width="1"/>
  
  <!-- Cosmic energy aura -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#7c2d12" stroke-width="2" opacity="0.6" stroke-dasharray="4,4"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  
  <!-- Mexican decorative elements -->
  <circle cx="40" cy="160" r="4" fill="#fbbf24"/>
  
  <!-- Title -->
  <text x="100" y="190" text-anchor="middle" font-family="serif" font-size="11" fill="#fbbf24" font-weight="bold">TZITZIMIMEH</text>
</svg>